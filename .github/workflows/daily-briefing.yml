name: Daily Zhizhe Briefing

on:
  workflow_dispatch:
    inputs:
      offline_sample:
        description: "Use deterministic sample data"
        required: false
        default: "false"
  schedule:
    - cron: "30 0 * * *"

permissions:
  contents: write

jobs:
  daily-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Generate briefing
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
        run: |
          if [ "${{ github.event.inputs.offline_sample }}" = "true" ]; then
            python -m src.main --offline-sample
          else
            python -m src.main
          fi

      - name: Commit generated briefing
        run: |
          if git diff --quiet -- data/briefings; then
            echo "No generated changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/briefings
          git commit -m "Generate daily Zhizhe briefing"
          git push
